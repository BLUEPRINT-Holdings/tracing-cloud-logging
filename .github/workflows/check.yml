name: CI Checks
on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '--cfg tracing_unstable'
  RUSTDOCFLAGS: '--cfg docsrs'

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: ⚡ Cache
        uses: Swatinem/rust-cache@v2
      - name: Run cargo check
        run: cargo check --all-features
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: ⚡ Cache
        uses: Swatinem/rust-cache@v2
      - name: Run cargo test
        run: cargo test --all-features
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: ⚡ Cache
        uses: Swatinem/rust-cache@v2
      - name: Run cargo clippy
        run: cargo clippy --all-features -- -D warnings
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: ⚡ Cache
        uses: Swatinem/rust-cache@v2
      - name: Run cargo doc
        # `--no-deps` avoids documenting dependencies such as `valuable`, whose older
        # `#![cfg_attr(docsrs, feature(...))]` attributes reference nightly doc features
        # that were removed in Rust 1.92. This also mirrors how docs.rs documents only
        # this crate.
        run: cargo doc --no-deps --all-features
